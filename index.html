<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DefCoreLib Catalog</title>
  <link rel="stylesheet" href="./util/catalog.css">
  <!-- catalog.js pulls in placed3d.js (card thumbnails), which imports three. Must precede the module. -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <h1>DefCoreLib Catalog</h1>
  <p class="subtitle">All custom items, what they do, and how to craft them.
    &nbsp;·&nbsp; <a href="./showcases.html">⚙ Showcases</a>
    &nbsp;·&nbsp; <a href="./skin-editor/">🛠 Skin Editor</a></p>
  <p class="subtitle">
    📖 <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/defCoreLib.md" target="_blank" rel="noopener">DefCoreLib README</a>
    &nbsp;·&nbsp; Plugins:
    <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/mech.md" target="_blank" rel="noopener">Mechanism</a> ·
    <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/vslab.md" target="_blank" rel="noopener">Vertical Slabs</a> ·
    <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/bbanners.md" target="_blank" rel="noopener">BetterBanners</a> ·
    <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/redstonedisplays.md" target="_blank" rel="noopener">RedstoneDisplays</a> ·
    <a href="https://github.com/def9a2a4/defCoreLib/blob/main/docs/readmes/pipes.md" target="_blank" rel="noopener">Pipes</a></p>

  <div class="controls">
    <input type="text" id="search-input" placeholder="Search items...">
    <div class="filter-pills" id="namespace-pills"></div>
  </div>

  <div class="counter" id="counter"></div>
  <div id="error"></div>
  <div id="items-container"></div>

  <section id="slab-section">
    <h2 class="section-title">VerticalSlabs <span class="counter inline" id="slab-counter"></span> <a class="section-modrinth" href="https://modrinth.com/plugin/vslab" target="_blank" rel="noopener">Download VerticalSlabs on Modrinth ↗</a></h2>
    <div id="slab-grid" class="slab-grid"></div>
  </section>

  <script type="module" src="./util/catalog.js"></script>
</body>
</html>
